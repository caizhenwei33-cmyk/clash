#---------------------------------------------------#
# Clash 配置文件模板
# 适用于 Clash Meta / Clash Verge
#---------------------------------------------------#

port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: true
mode: Rule
log-level: info
external-controller: 127.0.0.1:9090
external-ui: ui

# ----------------------------------------------------
# 代理节点（方式一：直接配置）
# ----------------------------------------------------
proxies:
  # 示例节点，替换为你自己的
  # - name: "🇭🇰 HK-01"
  #   type: vmess
  #   server: example.com
  #   port: 443
  #   uuid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
  #   alterId: 0
  #   cipher: auto
  #   tls: true
  #   network: ws
  #   ws-opts:
  #     path: /
  #     headers:
  #       Host: example.com

# ----------------------------------------------------
# 代理节点（方式二：订阅链接 - 推荐）
# ----------------------------------------------------
proxy-providers:
  Provider:
    type: http
    url: "https://example.com/sub?target=clash"  # 替换为你的订阅链接
    interval: 86400
    path: ./proxy_provider.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ----------------------------------------------------
# 代理组
# ----------------------------------------------------
proxy-groups:
  - name: 🚀 自动选择
    type: url-test
    proxies:
      - ♻️ 自动选择
      - DIRECT
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: ♻️ 自动选择
    type: fallback
    use:
      - Provider
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🌍 国外流量
    type: select
    proxies:
      - 🚀 自动选择
      - ♻️ 自动选择
      - DIRECT

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 自动选择

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 自动选择
      - ♻️ 自动选择
      - DIRECT

# ----------------------------------------------------
# 规则
# ----------------------------------------------------
rules:
